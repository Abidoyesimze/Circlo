name: CI

on:
  push:
    branches: [main]
  pull_request:

jobs:
  contract:
    name: Contract (test + build)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: wasm32v1-none

      - name: Cache cargo
        uses: Swatinem/rust-cache@v2

      - name: cargo test
        run: cargo test -p circlo

      - name: cargo clippy
        run: cargo clippy -p circlo --all-targets -- -D warnings

      - name: Install stellar CLI
        run: cargo install --locked stellar-cli --version ^25

      - name: stellar contract build
        run: stellar contract build

  frontend:
    name: Frontend (lint + build)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install Node
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Lint
        run: npm run lint

      - name: Build
        run: npm run build
