name: CI

on:
  push:
    branches: [main]
  pull_request:

jobs:
  contract:
    name: Contract (test + build)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: wasm32v1-none

      - name: Cache cargo
        uses: Swatinem/rust-cache@v2

      - name: cargo test
        run: cargo test -p circlo

      - name: cargo clippy
        run: cargo clippy -p circlo --all-targets -- -D warnings

      - name: Install stellar CLI
        # A prebuilt binary rather than `cargo install --locked`: the
        # published Cargo.lock for stellar-cli 25.x pins ethnum 1.5.2, which
        # fails to compile on current stable rustc (a fixed transmute size
        # check on TryFromIntError) — ethnum 1.5.3 fixes it, but --locked
        # can't pick that up.
        run: |
          curl -sL -o stellar-cli.tar.gz \
            https://github.com/stellar/stellar-cli/releases/download/v25.2.0/stellar-cli-25.2.0-x86_64-unknown-linux-gnu.tar.gz
          tar -xzf stellar-cli.tar.gz
          sudo mv stellar /usr/local/bin/
          stellar --version

      - name: stellar contract build
        run: stellar contract build

  frontend:
    name: Frontend (lint + build)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install Node
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Lint
        run: npm run lint

      - name: Unit tests
        run: npm test --workspace frontend

      - name: Build
        run: npm run build
