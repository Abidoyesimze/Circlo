<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/svg+xml" href="/favicon.svg" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta
      name="description"
      content="Circlo — trustless rotating savings circles (ajo/esusu/tanda/chama/susu) enforced by a Soroban smart contract on Stellar."
    />
    <title>Circlo — Rotating Savings Circles on Stellar</title>
    <script>
      // Applied before first paint to avoid a flash of the wrong theme.
      // src/lib/theme.ts takes over from here to react to live OS changes.
      if (window.matchMedia("(prefers-color-scheme: dark)").matches) {
        document.documentElement.classList.add("dark");
      }
    </script>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
